<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Conversor Profissional</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background: #f4f6f9; }

.card { border-radius: 15px; }

.drop-zone {
    border: 2px dashed #0d6efd;
    padding: 50px;
    text-align: center;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}
.drop-zone.dragover {
    background: #e9f2ff;
}

.progress { height: 20px; display: none; }
</style>
</head>

<body>

<div class="container mt-5">
<div class="card shadow p-4">

<h3 class="text-center mb-4">🚀 Conversor PDF → TXT</h3>

<form method="POST" enctype="multipart/form-data">

<div class="drop-zone" id="dropZone">
    Arraste PDFs aqui ou clique
    <input type="file" name="files" id="fileInput" multiple hidden>
</div>

<div id="fileList" class="mt-3"></div>

<div class="progress mt-3" id="progressBar">
  <div class="progress-bar progress-bar-striped progress-bar-animated" style="width: 100%">Processando...</div>
</div>

<div class="text-center mt-4">
    <button class="btn btn-primary btn-lg" onclick="mostrarLoading()">Converter</button>
</div>

</form>

{% if arquivos %}
<hr>
<h5>📄 Arquivos gerados</h5>

<ul class="list-group">
{% for arq in arquivos %}
<li class="list-group-item d-flex justify-content-between">
    {{ arq }}
    <a href="/download/{{ arq }}" class="btn btn-success btn-sm">Baixar</a>
</li>
{% endfor %}
</ul>
{% endif %}

{% if zip_ready %}
<div class="text-center mt-4">
    <a href="/download-zip" class="btn btn-dark btn-lg">📦 Baixar tudo (ZIP)</a>
</div>
{% endif %}

</div>
</div>

<script>
const dropZone = document.getElementById("dropZone");
const input = document.getElementById("fileInput");
const fileList = document.getElementById("fileList");

dropZone.addEventListener("click", () => input.click());

dropZone.addEventListener("dragover", e => {
    e.preventDefault();
    dropZone.classList.add("dragover");
});

dropZone.addEventListener("dragleave", () => {
    dropZone.classList.remove("dragover");
});

dropZone.addEventListener("drop", e => {
    e.preventDefault();
    input.files = e.dataTransfer.files;
    mostrarArquivos();
});

input.addEventListener("change", mostrarArquivos);

function mostrarArquivos() {
    fileList.innerHTML = "";
    for (let file of input.files) {
        fileList.innerHTML += `<div>📎 ${file.name}</div>`;
    }
}

function mostrarLoading() {
    document.getElementById("progressBar").style.display = "block";
}
</script>

</body>
</html>
